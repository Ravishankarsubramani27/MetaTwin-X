<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaTwin-X 3D Organ Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 100%);
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  #canvas-container { width: 100%; height: 100vh; position: relative; }
  canvas { display: block; }
  #tooltip {
    position: absolute;
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    pointer-events: none;
    display: none;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
    z-index: 100;
  }
  #legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    padding: 10px 14px;
    color: #fff;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  #instructions {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: #aaa;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 8px;
    text-align: right;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div id="canvas-container">
  <div id="tooltip"></div>
  <div id="legend">
    <div style="font-weight:bold; margin-bottom:6px; color:#eee;">Risk Level</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div> Low (&lt; 40%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FF9800"></div> Moderate (40–70%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#F44336"></div> High (&ge; 70%)</div>
  </div>
  <div id="instructions">
    🖱 Drag to rotate<br>
    🖱 Scroll to zoom<br>
    👆 Click organ for details
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="main.js"></script>
</body>
</html>
